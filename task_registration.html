<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master - Modern UI</title>
    <link rel="stylesheet" href="../style/task_registration.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-blobs">
        <div class="blob color-1"></div>
        <div class="blob color-2"></div>
    </div>

    <main class="glass-container">
        <header class="glass-header">
            <div class="header-content">
                <div class="icon-circle">✨</div>
                <div>
                    <h1>Nova Tarefa</h1>
                    <p> Organize o seu dia com estilo</p>
                </div>
            </div>
            <div class="status-badge">Ativo</div>
        </header>

        <div class="content-wrapper">
            <aside class="type-grid" id="typeSelector">
                <button class="type-card" data-type="Viagem"><span>✈️</span> Viagem</button>
                <button class="type-card" data-type="Café"><span>☕</span> Café</button>
                <button class="type-card" data-type="Almoço"><span>🍲</span> Almoço</button>
                <button class="type-card" data-type="Trabalho"><span>💼</span> Job</button>
                <button class="type-card" data-type="Passeio"><span>🚲</span> Lazer</button>
                <button class="type-card" data-type="Outros"><span>➕</span> Outro</button>
            </aside>

            <section class="main-form">
                <div class="input-row">
                    <div class="input-group">
                        <label>O que será feito?</label>
                        <input type="text" id="titulo" placeholder="Ex: Reunião de Design">
                    </div>
                    <div class="input-group">
                        <label>Onde?</label>
                        <input type="text" id="local" placeholder="Google Meet, Escritório...">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Data Limite</label>
                        <input type="date" id="prazo">
                    </div>
                    <div class="input-group">
                        <label>Integrantes</label>
                        <div class="modern-chip-input">
                            <input type="text" id="intInput" placeholder="Adicionar nome...">
                            <button onclick="addIntegrante()">+</button>
                        </div>
                        <div id="chipContainer" class="chip-container"></div>
                    </div>
                </div>

                <div class="input-group full">
                    <label>Notas Adicionais</label>
                    <textarea id="descricao" placeholder="Detalhes importantes da tarefa..."></textarea>
                </div>

                <div class="form-footer">
                    <button class="btn-secondary" onclick="limparCampos()">Descartar</button>
                    <button class="btn-primary" onclick="salvarTarefa()">Criar Tarefa</button>
                </div>
            </section>
        </div>
    </main>

    <script src="../js/task_registration.js"></script>
</body>
</html>
