<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="register" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <script src="../js/register.js" defer></script>
    <link rel="stylesheet" href="../style/register.css">
</head>
<body>
<div class="background-glow"></div>
<div class="conteiner">    
 <form id="cadastroUser">
    <h2>CADASTRO DE USUARIOS</h2>

    <!--caixa de texto NOME-->
    <div class="input-box"> 
    <label for="nome">Nome</label>
    <input type="text" id="nome" name="nome" placeholder="Digite o seu Nome...">
    </div>
    <!--caixa de texto E-MAIL--> 
    <div class="input-box"> 
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" placeholder="Digite o seu E-mail...">
    </div>
    <!--caixa de texto DATA DE NASCIMENTO-->
    <div class="input-box"> 
    <label for="dataN">Data de Nascimento</label>
    <input type="date" id="dataN" name="dataN">
    </div>
    <!--caixa de texto Telefone-->
    <div class="input-box"> 
    <label for="tel">Telefone</label>
    <input type="number" id="tel" name="tel" placeholder="Digite o seu Telefone...">
    </div>
    <!--CAIXA DE TEXTO SENHA--> 
    <div class="input-box"> 
    <label for="senha">Senha</label>
    <input type="password" id="senha" name="senha" placeholder="Crie a sua senha...">
    </div>
    <!--Botao cadastrar-->
    <input type="submit" value="CADASTRAR" class="btn">
<br><br>
<a href="index.html">Retornar a tela de login</a>
 </form>
 <span id="mensagem"></span> 
<p id="mensagems"></p> 
</div> 
 
</body>
</html>
