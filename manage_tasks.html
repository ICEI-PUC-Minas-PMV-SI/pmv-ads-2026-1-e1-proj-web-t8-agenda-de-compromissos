<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas - Lista</title>
    <link rel="stylesheet" href="../style/manage_tasks.css">
</head>
<body>

    <header class="top-bar">
        <div class="icon-group left"><div class="icon">🗑️</div></div>
        <div class="icon-group center">
            <div class="icon">📅</div><div class="icon">🗓️</div><div class="icon">🏠</div>
            <div class="icon">✏️</div><div class="icon">📒</div>
            <div class="icon active">📝</div>
        </div>
        <div class="icon-group right"><div class="icon profile">👤</div></div>
    </header>

    <main class="main-container">
        <div class="card list-card">
            <div class="search-container">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Pesquisar tarefas..." onkeyup="filtrarTarefas()">
                </div>
            </div>

            <div id="dynamicTaskList" class="task-items-container">
                </div>
        </div>
    </main>

    <script src="../js/manage_tasks.js"></script>
</body>
</html>
